<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic Portal - Secure Gate</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="w-full max-w-md bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl space-y-6"
    >
      <div class="text-center space-y-2">
        <span class="text-5xl inline-block drop-shadow-lg">🛡️</span>
        <h1 class="text-2xl font-extrabold text-blue-400">Clinical Gateway</h1>
        <p class="text-xs text-slate-400">
          Hospital Information System Authentication
        </p>
      </div>

      <div
        id="alertBox"
        class="hidden p-3.5 rounded-xl text-xs font-mono border"
      ></div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5"
            >Username / Medical ID:</label
          >
          <input
            type="text"
            id="username"
            placeholder="e.g., admin_doctor"
            class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-sm font-mono"
          />
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5"
            >Security Password:</label
          >
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-sm"
          />
        </div>

        <button
          onclick="handleLogin()"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-600/10 text-sm mt-2"
        >
          Authorize Session
        </button>
      </div>

      <div class="text-center pt-2">
        <a
          href="/patient.html"
          class="text-xs text-slate-500 hover:text-emerald-400 transition font-medium"
        >
          ← Switch to Public Patient Portal
        </a>
      </div>
    </div>

    <script>
      function handleLogin() {
        const userVal = document.getElementById("username").value;
        const passVal = document.getElementById("password").value;
        const alertBox = document.getElementById("alertBox");

        alertBox.className = "hidden"; // إعادة تصفير التحذير

        // إرسال البيانات للـ SQLi Endpoint المصابة
        fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: userVal, password: passVal }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              alertBox.className =
                "p-3.5 rounded-xl text-xs font-mono border bg-emerald-950/30 text-emerald-400 border-emerald-900/50 block";
              alertBox.innerHTML = `<strong>🟢 ACCESS GRANTED!</strong><br>Authenticated as: ${data.user}<br>Redirecting...`;

              // تخزين الجلسة في المتصفح والتحويل التلقائي للوحة الطبيب بعد ثانية ونصف
              localStorage.setItem("medical_session", data.user);
              setTimeout(() => {
                window.location.href = "/doctor.html";
              }, 1500);
            } else {
              alertBox.className =
                "p-3.5 rounded-xl text-xs font-mono border bg-rose-950/20 text-rose-400 border-rose-900/50 block";
              alertBox.innerHTML = `<strong>🔴 ACCESS DENIED:</strong> ${data.message}`;
            }
          })
          .catch((err) => {
            console.error(err);
          });
      }
    </script>
  </body>
</html>
