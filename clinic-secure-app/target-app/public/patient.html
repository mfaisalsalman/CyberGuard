<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Clinic - Patient Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-100 font-sans min-h-screen p-6 flex flex-col items-center"
  >
    <div class="w-full max-w-4xl space-y-8">
      <div
        class="flex items-center justify-between bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl"
      >
        <div class="flex items-center space-x-4">
          <span class="text-4xl">🏥</span>
          <div>
            <h1 class="text-2xl font-bold text-emerald-400">
              Smart Medical Clinic
            </h1>
            <p class="text-sm text-slate-400">
              Welcome to the Patient Central Portal
            </p>
          </div>
        </div>
        <span
          class="bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-xs font-mono border border-emerald-500/20"
        >
          Patient Mode
        </span>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div
          class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg space-y-4"
        >
          <div
            class="flex items-center space-x-2 text-emerald-400 font-bold text-lg"
          >
            <span>🔍</span>
            <h2>Search Clinic Directory</h2>
          </div>
          <p class="text-xs text-slate-400">
            Find medical departments, clinics, or available consultants.
          </p>

          <form action="/patient/search" method="GET" class="space-y-3">
            <div>
              <label class="block text-xs text-slate-400 mb-1"
                >Department Name:</label
              >
              <input
                type="text"
                name="q"
                placeholder="e.g., Cardiology, Dental..."
                class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-emerald-500 text-sm"
              />
            </div>
            <button
              type="submit"
              class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2.5 rounded-xl transition shadow-lg shadow-emerald-500/10 text-sm"
            >
              Search Directory
            </button>
          </form>
        </div>

        <div
          class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg space-y-4"
        >
          <div
            class="flex items-center space-x-2 text-rose-400 font-bold text-lg"
          >
            <span>📅</span>
            <h2>Quick Appointment Booking</h2>
          </div>
          <p class="text-xs text-slate-400">
            Request an immediate clinical checkup slot.
          </p>

          <form action="/patient/book" method="POST" class="space-y-3">
            <div>
              <label class="block text-xs text-slate-400 mb-1"
                >Full Name:</label
              >
              <input
                type="text"
                name="patient_name"
                placeholder="Enter your full name"
                class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-rose-500 text-sm"
              />
            </div>
            <div>
              <label class="block text-xs text-slate-400 mb-1"
                >Preferred Date:</label
              >
              <input
                type="text"
                name="app_date"
                placeholder="e.g., Tomorrow morning"
                class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl focus:outline-none focus:border-rose-500 text-sm"
              />
            </div>
            <button
              type="submit"
              class="w-full bg-rose-500 hover:bg-rose-600 text-slate-950 font-bold py-2.5 rounded-xl transition shadow-lg shadow-rose-500/10 text-sm"
            >
              Submit Booking Request
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
